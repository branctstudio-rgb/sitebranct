name: Deploy para Hostinger (SSH + Rsync)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
            --exclude='APP/' \
            --exclude='n8n/' \
            --exclude='testecliente/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.vscode/' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='CHANGELOG-3D-FIX.md' \
            --exclude='GEMINI-FIXES-APPLIED.md' \
            --exclude='MELHORIAS-SUGERIDAS.md' \
            --exclude='MOCKUP-IMPLEMENTATION.md' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy concluido
        run: echo "Deploy realizado com sucesso! Pastas APP/, n8n/ e testecliente/ preservadas."
