name: Deploy para Hostinger (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa

      - name: Deploy via SFTP (lftp)
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -e "
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -p $SSH_PORT -i ~/.ssh/id_rsa';
            open sftp://${SSH_USER}@${SSH_HOST};
            mirror --reverse --delete --verbose \
              --exclude APP/ \
              --exclude n8n/ \
              --exclude testecliente/ \
              --exclude .git/ \
              --exclude .github/ \
              --exclude node_modules/ \
              --exclude .vscode/ \
              --exclude .gitignore \
              --exclude package.json \
              --exclude package-lock.json \
              --exclude CHANGELOG-3D-FIX.md \
              --exclude GEMINI-FIXES-APPLIED.md \
              --exclude MELHORIAS-SUGERIDAS.md \
              --exclude MOCKUP-IMPLEMENTATION.md \
              ./ ${DEPLOY_PATH}/;
            quit
          "

      - name: Deploy concluido
        run: echo "Deploy realizado com sucesso! Pastas APP/, n8n/ e testecliente/ preservadas."
