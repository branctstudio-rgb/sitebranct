name: Deploy para Hostinger (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp mirror)
        env:
          FTP_USER: ${{ secrets.SSH_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.SSH_HOST }}
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:ssl-protect-data yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open ftp://${FTP_USER}:${FTP_PASS}@${FTP_HOST};
            mirror --reverse --delete --verbose --parallel=5 \
              --exclude ^APP/ \
              --exclude ^n8n/ \
              --exclude ^testecliente/ \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^node_modules/ \
              --exclude ^\.vscode/ \
              --exclude ^\.gitignore$ \
              --exclude ^package\.json$ \
              --exclude ^package-lock\.json$ \
              --exclude ^CHANGELOG-3D-FIX\.md$ \
              --exclude ^GEMINI-FIXES-APPLIED\.md$ \
              --exclude ^MELHORIAS-SUGERIDAS\.md$ \
              --exclude ^MOCKUP-IMPLEMENTATION\.md$ \
              ./ /public_html/;
            quit
          "

      - name: Deploy concluido
        run: echo "Deploy realizado com sucesso! Pastas APP/, n8n/ e testecliente/ preservadas."
