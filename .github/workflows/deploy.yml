name: Deploy para Hostinger (SSH + Rsync)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via Rsync
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='APP/' \
            --exclude='n8n/' \
            --exclude='testecliente/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.vscode/' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='CHANGELOG-3D-FIX.md' \
            --exclude='GEMINI-FIXES-APPLIED.md' \
            --exclude='MELHORIAS-SUGERIDAS.md' \
            --exclude='MOCKUP-IMPLEMENTATION.md' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/

      - name: Deploy concluido
        run: echo "Deploy realizado com sucesso! Pastas APP/, n8n/ e testecliente/ preservadas."
